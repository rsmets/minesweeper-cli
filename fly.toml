# fly.toml app configuration file for minesweeper-web
app = "minesweeper-cli"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    restart_limit = 0
    timeout = "10s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    tls_skip_verify = false

    [http_service.checks.headers]
    Content-Type = "application/json"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
  processes = ["app"]

[processes]
  app = "node dist/server.js"
